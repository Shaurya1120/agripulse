spring.application.name=AgriPulse
spring.profiles.default=dev
server.port=${PORT:8080}

# Shared JPA defaults
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update

# Shared AI defaults
spring.ai.model.chat=google-genai
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=${GEMINI_MODEL:gemini-2.0-flash}
spring.ai.google.genai.chat.options.temperature=0.2
spring.ai.google.genai.chat.options.response-mime-type=application/json
spring.ai.google.genai.chat.options.internal-tool-execution-enabled=true

# Actuator health endpoints for cloud platforms
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db

server.error.include-message=never
