spring.application.name=AgriPulse
spring.profiles.default=dev
server.port=${PORT:8080}

# Shared JPA defaults
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update

# Shared AI defaults
spring.ai.model.chat=openai
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.api-key=${GROQ_API_KEY:${GEMINI_API_KEY:}}
spring.ai.openai.chat.options.model=${GROQ_MODEL:${GEMINI_MODEL:llama-3.1-8b-instant}}
spring.ai.openai.chat.options.temperature=0.2

# Actuator health endpoints for cloud platforms
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db

server.error.include-message=never
